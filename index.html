<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Udayana Portal" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-tap-highlight" content="no" />
    <title>Udayana Portal</title>

    <!-- PWA Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://babinsa05.github.io/tombol2/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://babinsa05.github.io/tombol2/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://babinsa05.github.io/tombol2/favicon-16x16.png">
    <link rel="manifest" href="https://babinsa05.github.io/tombol2/site.webmanifest">

    <style>
        /* ===== CRITICAL CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow-x: hidden;
            background: #0a1525;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        /* ===== APP SHELL ===== */
        .app-shell {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a1525 0%, #071121 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        .app-shell.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .app-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        .app-title {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .app-loading {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }
        .app-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            display: none;
        }
        .main-content.loaded {
            display: block;
        }

        /* ===== HEADER ===== */
        .udayana-header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        .udayana-logo {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
            margin-bottom: 15px;
        }
        .udayana-title {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }

        /* ===== BUTTONS GRID ===== */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        @media (max-width: 480px) {
            .buttons-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .portal-button {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px 10px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
            backdrop-filter: blur(10px);
        }
        .portal-button:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .button-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .button-text {
            text-align: center;
            line-height: 1.3;
        }

        /* ===== INSTALL BUTTON ===== */
        .install-fixed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .install-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: black;
            border: none;
            border-radius: 25px;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            min-width: 160px;
            font-size: 14px;
        }
        .install-btn:hover {
            transform: scale(1.05);
        }
        .install-btn.apk {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .install-btn.apk .android-icon {
            font-size: 20px;
        }
        .install-btn.apk .badge-android {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 10px;
            color: #a5d6a7;
            margin-left: 4px;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 1001;
            pointer-events: none;
        }
        .toast {
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 12px 24px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== ERROR BOUNDARY ===== */
        .error-boundary {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a1525;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10000;
        }
        .error-boundary.active {
            display: flex;
        }
        .error-icon {
            font-size: 60px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        .error-message {
            color: white;
            margin-bottom: 20px;
            max-width: 400px;
        }
        .retry-btn {
            background: #ffd700;
            color: black;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .install-fixed {
                bottom: 15px;
                right: 15px;
                gap: 8px;
            }
            .install-btn {
                min-width: 140px;
                padding: 10px 16px;
                font-size: 13px;
                border-radius: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- APP SHELL -->
    <div class="app-shell" id="appShell">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/25/Lambang_Kodam_Udayana.svg" alt="Udayana" class="app-logo">
        <div class="app-title">UDAYANA PORTAL</div>
        <div class="app-loading">
            <div class="app-progress" id="appProgress"></div>
        </div>
    </div>

    <!-- ERROR BOUNDARY -->
    <div class="error-boundary" id="errorBoundary">
        <div class="error-icon">⚠️</div>
        <div class="error-message" id="errorMessage">Terjadi kesalahan saat memuat aplikasi.</div>
        <button class="retry-btn" onclick="window.location.reload()">Coba Lagi</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <header class="udayana-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/25/Lambang_Kodam_Udayana.svg" alt="Udayana" class="udayana-logo">
            <h1 class="udayana-title">UDAYANA PORTAL</h1>
        </header>
        <main class="buttons-grid">
            <!-- TOMBOL DUKOPS dengan MULTI LINK -->
            <button class="portal-button" id="btn1">
                <div class="button-icon">🛡️</div>
                <div class="button-text">DUKOPS</div>
            </button>
            <button class="portal-button" id="btn2">
                <div class="button-icon">🎖️</div>
                <div class="button-text">gabungtxt</div>
            </button>
            <button class="portal-button" id="btn3">
                <div class="button-icon">📁</div>
                <div class="button-text">GOOGLE DRIVE</div>
            </button>
            <button class="portal-button" id="btn4">
                <div class="button-icon">🗺️</div>
                <div class="button-text">PEMETAAN LAHAN</div>
            </button>
            <button class="portal-button" id="btn5">
                <div class="button-icon">🌐</div>
                <div class="button-text">PORTAL KDKMP</div>
            </button>
            <button class="portal-button" id="btn6">
                <div class="button-icon">🙏</div>
                <div class="button-text">LIKE & SUBCRIBE</div>
            </button>
        </main>
    </div>

    <!-- INSTALL BUTTON (PWA) -->
    <div class="install-fixed" id="installFixed">
        <button class="install-btn apk" id="installButton">
            <span class="android-icon">📲</span>
            Pasang Aplikasi
            <span class="badge-android">PWA</span>
        </button>
    </div>

    <!-- TOAST -->
    <div class="toast-container">
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ============================================================
        //  FUNGSI BUKA LINK DENGAN FALLBACK (UNTUK DUKOPS)
        // ============================================================
        function openWithFallback(urls, name) {
            let currentIndex = 0;

            function tryOpen() {
                if (currentIndex >= urls.length) {
                    showToast('Semua link ' + name + ' gagal dibuka', 3000);
                    return;
                }

                const url = urls[currentIndex];
                showToast('Mencoba ' + name + ' (' + (currentIndex + 1) + '/' + urls.length + ')...', 2000);

                try {
                    const newWindow = window.open(url, '_blank');

                    if (newWindow && !newWindow.closed) {
                        console.log('✅ ' + name + ' berhasil dibuka: ' + url);
                        currentIndex = 0;
                        return;
                    }

                    console.warn('⚠️ Gagal buka ' + name + ' link ' + (currentIndex + 1) + ': ' + url);
                    currentIndex++;
                    setTimeout(tryOpen, 500);

                } catch (error) {
                    console.warn('⚠️ Error buka ' + name + ' link ' + (currentIndex + 1) + ': ' + error.message);
                    currentIndex++;
                    setTimeout(tryOpen, 500);
                }
            }

            tryOpen();
        }

        // ============================================================
        //  FUNGSI BUKA LINK DENGAN FALLBACK UNTUK LIKE & SUBCRIBE
        // ============================================================
        function openLikeSubscribe() {
            const urls = [
                'https://solitary-bush-01a6.sukasada1609-05.workers.dev/',
                'https://stb606601-droid.github.io/seribulikes05/'
            ];
            let currentIndex = 0;

            function tryOpen() {
                if (currentIndex >= urls.length) {
                    showToast('Semua link LIKE & SUBCRIBE gagal dibuka', 3000);
                    return;
                }

                const url = urls[currentIndex];
                showToast('Mencoba LIKE & SUBCRIBE (' + (currentIndex + 1) + '/' + urls.length + ')...', 2000);

                try {
                    const newWindow = window.open(url, '_blank');

                    if (newWindow && !newWindow.closed) {
                        console.log('✅ LIKE & SUBCRIBE berhasil dibuka: ' + url);
                        currentIndex = 0;
                        return;
                    }

                    console.warn('⚠️ Gagal buka LIKE & SUBCRIBE link ' + (currentIndex + 1) + ': ' + url);
                    currentIndex++;
                    setTimeout(tryOpen, 500);

                } catch (error) {
                    console.warn('⚠️ Error buka LIKE & SUBCRIBE link ' + (currentIndex + 1) + ': ' + error.message);
                    currentIndex++;
                    setTimeout(tryOpen, 500);
                }
            }

            tryOpen();
        }

        // ============================================================
        //  INSTALL PWA
        // ============================================================
        let deferredPrompt = null;
        const installBtn = document.getElementById('installButton');

        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('📱 PWA install prompt tersedia');
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });

        window.addEventListener('appinstalled', () => {
            console.log('✅ PWA berhasil diinstal');
            installBtn.style.display = 'none';
            showToast('Aplikasi berhasil dipasang! 🎉', 3000);
        });

        window.addEventListener('load', () => {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                installBtn.style.display = 'none';
                console.log('📱 Berjalan sebagai aplikasi terinstal');
            }
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('✅ Pengguna menerima instalasi');
                    showToast('Memasang aplikasi...', 2000);
                } else {
                    console.log('❌ Pengguna menolak instalasi');
                    showToast('Instalasi dibatalkan', 2000);
                }
                deferredPrompt = null;
            } else {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                const isAndroid = /Android/.test(navigator.userAgent);
                let pesan = '📱 Cara memasang ke layar utama:\n\n';
                if (isIOS) {
                    pesan += '1. Buka di Safari\n2. Ketuk ikon Bagikan (⬆️)\n3. Pilih "Tambahkan ke Layar Utama"';
                } else if (isAndroid) {
                    pesan += '1. Buka di Chrome\n2. Ketuk menu (⋮)\n3. Pilih "Tambahkan ke layar utama"';
                } else {
                    pesan += '1. Buka di Chrome/Edge\n2. Klik menu (⋮) atau (⋯)\n3. Pilih "Install" atau "Tambahkan ke layar utama"';
                }
                alert(pesan);
            }
        });

        // ============================================================
        //  SISA FUNGSI APLIKASI
        // ============================================================

        window.addEventListener('error', (e) => {
            console.error('Global Error:', e.error);
            showError('Terjadi kesalahan: ' + (e.message || 'Unknown error'));
            return true;
        });
        window.addEventListener('unhandledrejection', (e) => {
            console.error('Unhandled Promise:', e.reason);
            showError('Promise rejected: ' + (e.reason || 'Unknown'));
        });

        function showError(message) {
            const errorBoundary = document.getElementById('errorBoundary');
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorBoundary.classList.add('active');
            document.getElementById('appShell').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('loaded');
        }

        function hideError() {
            document.getElementById('errorBoundary').classList.remove('active');
        }

        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        function updateProgress(percent) {
            const progress = document.getElementById('appProgress');
            if (progress) {
                progress.style.width = Math.min(percent, 100) + '%';
            }
        }

        // ===== KONFIGURASI BUTTON =====
        const DUKOPS_URLS = [
            'https://sukasada05.github.io/sukasada05/',
            'https://sukasada05.github.io/dukops4/',
            'https://sukasada05.github.io/Hanpangan/'
        ];

        const BUTTON_CONFIG = {
            btn2: { url: "https://babinsa05.github.io/gabungtxt/", name: "gabungkan txt", fallback: "https://babinsa05.github.io/gabungtxt/" },
            btn3: { url: "https://drive.google.com/drive/folders/1K9iWrM9fGU3sMcEZCmUWIbx0rLs285_x", name: "GOOGLE DRIVE", fallback: "https://drive.google.com" },
            btn4: { url: "https://pemetaan-lahan.portalkdkmp.id", name: "PEMETAAN LAHAN", fallback: "https://pemetaan-lahan.portalkdkmp.id" },
            btn5: { url: "https://portalkdkmp.id/", name: "PORTAL KDKMP", fallback: "https://portalkdkmp.id" }
        };

        function setupButtons() {
            try {
                // ===== SETUP TOMBOL DUKOPS =====
                const btnDukops = document.getElementById('btn1');
                if (btnDukops) {
                    btnDukops.addEventListener('click', () => {
                        btnDukops.style.transform = 'scale(0.95)';
                        openWithFallback(DUKOPS_URLS, 'DUKOPS');
                        setTimeout(() => {
                            btnDukops.style.transform = '';
                        }, 1000);
                    });
                }

                // ===== SETUP TOMBOL LIKE & SUBCRIBE =====
                const btnLike = document.getElementById('btn6');
                if (btnLike) {
                    btnLike.addEventListener('click', () => {
                        btnLike.style.transform = 'scale(0.95)';
                        openLikeSubscribe();
                        setTimeout(() => {
                            btnLike.style.transform = '';
                        }, 1000);
                    });
                }

                // ===== SETUP TOMBOL LAINNYA =====
                Object.keys(BUTTON_CONFIG).forEach(btnId => {
                    const button = document.getElementById(btnId);
                    const config = BUTTON_CONFIG[btnId];
                    if (!button) return;
                    button.addEventListener('click', () => {
                        button.style.transform = 'scale(0.95)';
                        showToast('Membuka ' + config.name + '...');
                        setTimeout(() => {
                            try {
                                const newWindow = window.open(config.url, '_blank');
                                setTimeout(() => {
                                    if (!newWindow || newWindow.closed) {
                                        window.open(config.fallback, '_blank');
                                    }
                                }, 500);
                            } catch (error) {
                                window.open(config.fallback, '_blank');
                            }
                            setTimeout(() => { button.style.transform = ''; }, 1000);
                        }, 300);
                    });
                });
                console.log('Buttons setup successfully');
            } catch (error) {
                console.error('Error setting up buttons:', error);
                showError('Gagal setup tombol: ' + error.message);
            }
        }

        // ===== SERVICE WORKER =====
        async function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) return null;
            try {
                const registration = await navigator.serviceWorker.register('sw.js', {
                    scope: './',
                    updateViaCache: 'none'
                });
                console.log('✅ Service Worker registered:', registration.scope);
                return registration;
            } catch (error) {
                console.error('❌ Service Worker registration failed:', error);
                return null;
            }
        }

        // ===== MANIFEST =====
        function createManifest() {
            const manifest = {
                name: "Udayana Portal",
                short_name: "Udayana",
                description: "Portal Akses Cepat Kodam Udayana",
                start_url: "https://babinsa05.github.io/tombol2/",
                display: "standalone",
                background_color: "#0a1525",
                theme_color: "#000000",
                icons: [
                    { src: "https://babinsa05.github.io/tombol2/favicon-32x32.png", sizes: "32x32", type: "image/png" },
                    { src: "https://babinsa05.github.io/tombol2/apple-touch-icon.png", sizes: "180x180", type: "image/png" }
                ]
            };
            const manifestElement = document.createElement('link');
            manifestElement.rel = 'manifest';
            manifestElement.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
            const existing = document.querySelector('link[rel="manifest"]');
            if (existing) existing.remove();
            document.head.appendChild(manifestElement);
            console.log('✅ Dynamic Manifest created');
        }

        // ===== INIT =====
        async function initializeApp() {
            try {
                console.log('🚀 Initializing Udayana Portal...');
                updateProgress(10);
                createManifest();
                updateProgress(30);
                await registerServiceWorker();
                updateProgress(60);
                setupButtons();
                updateProgress(80);

                if (window.matchMedia('(display-mode: standalone)').matches) {
                    installBtn.style.display = 'none';
                }

                updateProgress(100);
                setTimeout(() => {
                    document.getElementById('appShell').classList.add('hidden');
                    document.getElementById('mainContent').classList.add('loaded');
                    hideError();
                    showToast('Udayana Portal siap digunakan! 🎯', 2000);
                }, 500);
            } catch (error) {
                console.error('❌ Initialization failed:', error);
                showError('Gagal memuat aplikasi: ' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(initializeApp, 100);
        });

        // ===== NETWORK =====
        window.addEventListener('online', () => showToast('Koneksi internet tersedia', 2000));
        window.addEventListener('offline', () => showToast('Mode offline aktif', 3000));

        // ===== UPDATE CHECK =====
        setInterval(() => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistration().then(reg => { if (reg) reg.update(); });
            }
        }, 3600000);
    </script>
</body>
</html>
